name: Release

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+*"]

# Least privilege (M8 supply-chain): default read for all jobs; only the
# release job that creates the GitHub release is granted contents: write.
permissions:
  contents: read

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  release:
    name: Build & Release
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 — SHA-pinned (M8 supply-chain)

      - name: Verify version
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          CYML_RAW=$(grep '^version = ' cyrius.cyml | head -1 | sed 's/version = "\(.*\)"/\1/')
          # ${file:VERSION} template means cyrius.cyml derives from VERSION;
          # resolve to FILE_VERSION for the consistency check.
          if [ "$CYML_RAW" = "\${file:VERSION}" ]; then
              CYML_VERSION="$FILE_VERSION"
          else
              CYML_VERSION="$CYML_RAW"
          fi
          TAG="${GITHUB_REF_NAME}"
          [ "$FILE_VERSION" = "$TAG" ] || { echo "VERSION ($FILE_VERSION) != tag ($TAG)"; exit 1; }
          [ "$CYML_VERSION" = "$TAG" ] || { echo "cyrius.cyml ($CYML_RAW) != tag ($TAG)"; exit 1; }
          echo "Version verified: $TAG (cyml: $CYML_RAW)"

      - name: Install Cyrius toolchain
        run: |
          set -e
          # cyrius.cyml [package].cyrius pin is the single source of truth.
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Build (DCE)
        run: |
          cyrius deps
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/attn11
          echo "attn11: $(wc -c < build/attn11) bytes"

      - name: Extract changelog
        run: |
          # Pass the tag as DATA (awk -v), never interpolated into the awk
          # program text — a hostile tag name cannot inject awk code (M8).
          awk -v tag="${GITHUB_REF_NAME}" 'index($0,"## ["tag"]")==1{found=1;next} /^## \[/{if(found)exit} found{print}' \
            CHANGELOG.md > /tmp/body.md
          if [ ! -s /tmp/body.md ]; then
            echo "No changelog entry for ${GITHUB_REF_NAME}." > /tmp/body.md
          fi

      - name: Archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          git archive --format=tar.gz --prefix="attn11-${TAG}/" -o "attn11-${TAG}-src.tar.gz" HEAD
          cp build/attn11 "attn11-${TAG}-x86_64-linux"
          sha256sum attn11-*.tar.gz attn11-*-x86_64-linux > SHA256SUMS

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2 — SHA-pinned (M8 supply-chain)
        with:
          name: "attn11 ${{ github.ref_name }}"
          body_path: /tmp/body.md
          prerelease: ${{ startsWith(github.ref_name, '0.') }}
          files: |
            attn11-*-src.tar.gz
            attn11-*-x86_64-linux
            SHA256SUMS
