name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 — SHA-pinned (M8 supply-chain)

      - name: Install Cyrius toolchain
        run: |
          set -e
          # The cyrius.cyml `[package].cyrius` pin is the single source of
          # truth for the toolchain version (CLAUDE.md § Rules) — no version
          # is hardcoded in this YAML. Read the pin and hand it to the upstream
          # installer, which fetches + lays out $HOME/.cyrius/{bin,lib}.
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Resolve deps
        run: cyrius deps

      - name: Format check
        # `cyrius fmt --check` per file — the same gate rosnet's CI enforces, added at
        # 1.10.0 so both repos share a format gate (the GPU backend now lives in rosnet;
        # any future code moving attn11 -> rosnet must already be fmt-clean). Hard gate:
        # `cyrius fmt --check` exits non-zero if a file is not formatted.
        run: |
          for f in src/*.cyr tests/*.tcyr tests/*.bcyr tests/*.fcyr tests/*.cyr; do
            cyrius fmt "$f" --check
          done

      - name: Lint
        # Hard gate: any `warn` line fails CI (matches patra / sigil).
        # attn11's src lints clean with zero warnings, so no per-file
        # exemptions are needed.
        run: |
          fail=0
          for f in src/*.cyr; do
            out=$(cyrius lint "$f" 2>&1 || true)
            echo "$out"
            if echo "$out" | grep -qE '^[[:space:]]*warn '; then
              echo "lint: warnings in $f"; fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "lint: warnings present"; exit 1; }

      - name: Build (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/attn11
          echo "attn11: $(wc -c < build/attn11) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/attn11 | grep -q "7f45 4c46"

      - name: Unit tests
        # Gradient checks: every op, attention, and the full model verified
        # against finite differences. `cyrius test` runs the [build].test
        # entry AND auto-discovers tests/*.tcyr.
        run: cyrius test

      - name: Fuzz
        run: |
          for f in tests/*.fcyr; do
            name=$(basename "$f" .fcyr)
            CYRIUS_DCE=1 cyrius build "$f" "build/$name"
            timeout 10 "build/$name" || { echo "FUZZ CRASH: $name"; exit 1; }
            echo "  $name: ok"
          done

      - name: Benchmarks
        run: |
          for f in tests/*.bcyr; do
            name=$(basename "$f" .bcyr)
            CYRIUS_DCE=1 cyrius build "$f" "build/$name"
            ./build/$name
          done

  aarch64:
    name: aarch64 (cross + qemu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 — SHA-pinned (M8 supply-chain)

      - name: Install Cyrius toolchain
        run: |
          set -e
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Install qemu-user-static
        run: sudo apt-get update && sudo apt-get install -y qemu-user-static

      - name: Resolve deps
        run: cyrius deps

      - name: Cross-build + run the gradient-check suite on aarch64
        # The f64_exp/f64_ln polyfills and the fused NEON FMA differ from x86;
        # the suite has arch-aware tolerances / SIMD contract so it must pass.
        run: |
          mkdir -p build
          cyrius build --aarch64 tests/attn11.tcyr build/test_a64
          qemu-aarch64-static build/test_a64

      - name: Cross-build + smoke-run the binary on aarch64
        # --gen-only exercises the full forward + generation path under qemu
        # without the slow training loop (backward is already covered by the
        # grad-check suite above).
        run: |
          cyrius build --aarch64 src/main.cyr build/attn11_a64
          qemu-aarch64-static build/attn11_a64 --gen-only

  agnos:
    name: AGNOS (cross-build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 — SHA-pinned (M8 supply-chain)

      - name: Install Cyrius toolchain
        run: |
          set -e
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Resolve deps
        run: cyrius deps

      - name: Cross-build the binary + grad-check suite for AGNOS
        # Build-only lane: running needs a booted AGNOS kernel (qemu-system +
        # OVMF + gnoboot), which lives in the agnos repo's smoke harnesses.
        # This gates the portable-syscall surface: any Linux-ism (raw syscall
        # numbers, fstat/fsync, NUL-path unlink/rename) fails this build.
        run: |
          mkdir -p build
          cyrius build --agnos src/main.cyr build/attn11_agnos
          cyrius build --agnos tests/attn11.tcyr build/test_agnos

      - name: Verify static ELF64
        # agnos exec-from-disk (elf_load_from_file) loads static x86_64
        # ELF64 only — reject anything dynamic before it ever reaches a disk.
        run: |
          file build/attn11_agnos | grep -q "ELF 64-bit.*x86-64.*static"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 — SHA-pinned (M8 supply-chain)
      - name: Scan for dangerous patterns
        run: |
          fail=0
          # Raw execve / fork-exec from source
          if grep -rn 'syscall(59' src/ 2>/dev/null | grep -v "# "; then
            echo "WARN: raw execve"; fail=1
          fi
          # Shelling out with unsanitized input (CLAUDE.md hard rule)
          if grep -rn 'sys_system' src/ 2>/dev/null | grep -v "# "; then
            echo "WARN: sys_system call"; fail=1
          fi
          # Hardcoded system paths
          if grep -rn '"/etc/' src/ 2>/dev/null; then
            echo "WARN: hardcoded /etc path"; fail=1
          fi
          echo "security scan complete"
          test $fail -eq 0

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 — SHA-pinned (M8 supply-chain)
      - name: Check required docs
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE cyrius.cyml; do
            if [ -f "$doc" ]; then echo "  OK: $doc"; else echo "  MISSING: $doc"; MISSING=1; fi
          done
          exit $MISSING
      - name: Verify version consistency
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          CYML_RAW=$(grep '^version = ' cyrius.cyml | head -1 | sed 's/version = "\(.*\)"/\1/')
          # ${file:VERSION} template means cyrius.cyml derives its version from
          # the VERSION file — VERSION is the single source of truth. Resolve
          # the template to the file content for the consistency check.
          if [ "$CYML_RAW" = "\${file:VERSION}" ]; then
              CYML_VERSION="$FILE_VERSION"
          else
              CYML_VERSION="$CYML_RAW"
          fi
          [ "$FILE_VERSION" = "$CYML_VERSION" ] || { echo "VERSION ($FILE_VERSION) != cyrius.cyml ($CYML_RAW)"; exit 1; }
          grep -q "$FILE_VERSION" CHANGELOG.md || { echo "version $FILE_VERSION not in CHANGELOG.md"; exit 1; }
          # the --version flag (CFG_VERSION in src/main.cyr) must report VERSION
          grep -q "return \"$FILE_VERSION\"" src/main.cyr || { echo "src/main.cyr CFG_VERSION != VERSION ($FILE_VERSION)"; exit 1; }
          echo "Version consistent: $FILE_VERSION (cyml: $CYML_RAW, --version OK)"
